<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול אתר בוחנים</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }

.header { background: #151f2b; padding: 16px; text-align: center; border-bottom: 2px solid #1e2d3d; position: sticky; top: 0; z-index: 20; }
.header h1 { color: #7bc67e; font-size: 1.3rem; margin-bottom: 4px; }
.header p { color: #6b7b8d; font-size: 0.8rem; }

.container { max-width: 700px; margin: 0 auto; padding: 16px; }

/* Token */
.token-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; background: #151f2b; padding: 12px; border-radius: 8px; border: 1px solid #1e2d3d; }
.token-bar label { color: #8a9a8e; font-size: 0.85rem; white-space: nowrap; }
.token-bar input { flex: 1; padding: 8px 10px; background: #0f1923; border: 1px solid #2a3a4a; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem; direction: ltr; }
.token-bar .status { font-size: 0.8rem; min-width: 24px; }

/* Step box */
.step { background: #151f2b; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #1e2d3d; }
.step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.step-num { width: 32px; height: 32px; background: #1a3a2a; color: #7bc67e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
.step-title { color: #7bc67e; font-size: 1rem; font-weight: 600; }

/* Drop zone */
.drop-zone { border: 2px dashed #2a3a4a; border-radius: 12px; padding: 30px 20px; text-align: center; color: #6b7b8d; cursor: pointer; transition: all 0.3s; }
.drop-zone:hover, .drop-zone.drag-over { border-color: #4a7c59; background: #1a3a2a22; color: #7bc67e; }
.drop-zone-icon { font-size: 2.5rem; margin-bottom: 6px; }
.file-input { display: none; }

/* Image cards - each image shown large with day buttons */
.image-cards { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }

.image-card { background: #0f1923; border: 2px solid #1e2d3d; border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
.image-card.assigned { border-color: #4a7c59; }

.image-card img { width: 100%; display: block; cursor: pointer; }

.card-bar { display: flex; align-items: center; gap: 6px; padding: 10px; flex-wrap: wrap; background: #151f2b; }
.card-bar-label { color: #8a9a8e; font-size: 0.8rem; margin-left: 4px; white-space: nowrap; }

.day-btn { padding: 8px 12px; font-size: 0.85rem; font-weight: 600; border: 2px solid #2a3a4a; border-radius: 8px; background: #0f1923; color: #8a9a9e; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.day-btn:hover { background: #1a2636; color: #b0c0c4; border-color: #3a4a5a; }
.day-btn.selected { background: #1a3a2a; color: #7bc67e; border-color: #4a7c59; }
.day-btn.weekly { color: #e0a030; }
.day-btn.weekly.selected { background: #3a2a0a; color: #e0a030; border-color: #a07020; }

.card-remove { margin-right: auto; padding: 6px 10px; background: #3a1515; color: #e74c3c; border: 1px solid #5a2020; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
.card-remove:hover { background: #5a2020; }

/* Summary section */
.summary { background: #151f2b; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #1e2d3d; }
.summary h3 { color: #7bc67e; margin-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1e2d3d; font-size: 0.9rem; }
.summary-row:last-child { border-bottom: none; }
.summary-day { color: #b0c0c4; }
.summary-count { color: #7bc67e; font-weight: 600; }
.summary-count.empty { color: #4a5a6a; }

/* Upload bar */
.upload-bar { position: sticky; bottom: 0; background: #151f2b; border-top: 2px solid #1e2d3d; padding: 12px 16px; display: flex; gap: 10px; align-items: center; justify-content: center; z-index: 10; }
.btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-upload { background: #2d6a4f; color: white; }
.btn-upload:hover { background: #3a8963; }
.btn-upload:disabled { background: #1a3a2a; color: #4a7c59; cursor: not-allowed; }
.btn-clear { background: #4a1a1a; color: #e74c3c; font-size: 0.85rem; padding: 10px 18px; }
.btn-clear:hover { background: #5a2020; }
.upload-status { color: #8a9a8e; font-size: 0.85rem; }

/* Progress */
.progress { width: 100%; height: 4px; background: #1e2d3d; border-radius: 2px; overflow: hidden; display: none; }
.progress.visible { display: block; }
.progress-fill { height: 100%; background: #4a7c59; transition: width 0.3s; width: 0%; }

/* Log */
.log { max-height: 150px; overflow-y: auto; font-size: 0.75rem; font-family: monospace; direction: ltr; text-align: left; margin-top: 8px; }
.log-item { padding: 2px 6px; border-radius: 3px; margin-bottom: 1px; }
.log-ok { background: #0a2a1a; color: #7bc67e; }
.log-err { background: #2a0a0a; color: #e74c3c; }
.log-info { background: #0a1a2a; color: #5a9aca; }

/* Lightbox */
.lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; cursor: pointer; }
.lightbox.active { display: flex; }
.lightbox img { max-width: 95vw; max-height: 95vh; }
.lightbox-close { position: fixed; top: 12px; left: 12px; color: white; font-size: 2rem; cursor: pointer; z-index: 1001; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }

.back-link { display: block; text-align: center; padding: 16px; color: #4a7c59; text-decoration: none; font-size: 0.9rem; }
.back-link:hover { color: #7bc67e; }

.no-images-msg { text-align: center; color: #4a5a6a; padding: 20px; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="header">
  <h1>ניהול אתר בוחנים</h1>
  <p>העלה תמונות → שייך לימים → שמור</p>
</div>

<div class="container">

  <!-- Token -->
  <div class="token-bar">
    <label>🔑 Token:</label>
    <input type="password" id="token-input" placeholder="ghp_xxxx..." />
    <span class="status" id="token-status"></span>
  </div>

  <!-- Step 1: Upload images -->
  <div class="step">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">העלה את כל התמונות</div>
    </div>
    <div class="drop-zone" id="drop-zone">
      <div class="drop-zone-icon">📸</div>
      <p>גרור תמונות לכאן או לחץ לבחירה</p>
    </div>
    <input type="file" class="file-input" id="file-input" multiple accept="image/*" />
  </div>

  <!-- Step 2: Assign each image -->
  <div class="step" id="step2" style="display:none;">
    <div class="step-header">
      <div class="step-num">2</div>
      <div class="step-title">שייך כל תמונה ליום (לחץ על תמונה להגדלה)</div>
    </div>
    <div class="image-cards" id="image-cards"></div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary" style="display:none;">
    <h3>📊 סיכום</h3>
    <div class="summary-row"><span class="summary-day">📋 סידור שבועי</span><span class="summary-count" data-sum="weekly">0</span></div>
    <div class="summary-row"><span class="summary-day">יום א'</span><span class="summary-count" data-sum="day1">0</span></div>
    <div class="summary-row"><span class="summary-day">יום ב'</span><span class="summary-count" data-sum="day2">0</span></div>
    <div class="summary-row"><span class="summary-day">יום ג'</span><span class="summary-count" data-sum="day3">0</span></div>
    <div class="summary-row"><span class="summary-day">יום ד'</span><span class="summary-count" data-sum="day4">0</span></div>
    <div class="summary-row"><span class="summary-day">יום ה'</span><span class="summary-count" data-sum="day5">0</span></div>
    <div class="summary-row" style="border-top: 2px solid #2a3a4a; margin-top: 4px; padding-top: 8px;"><span class="summary-day"><strong>לא משויך</strong></span><span class="summary-count" data-sum="none" style="color: #e74c3c;">0</span></div>
  </div>

</div>

<!-- Sticky upload bar -->
<div class="upload-bar" id="upload-bar" style="display:none;">
  <button class="btn btn-clear" onclick="clearAll()">🗑️ נקה</button>
  <button class="btn btn-upload" id="btn-upload" onclick="uploadAll()">💾 שמור באתר</button>
  <span class="upload-status" id="upload-status"></span>
</div>
<div class="progress" id="progress"><div class="progress-fill" id="progress-fill"></div></div>
<div style="max-width:700px;margin:0 auto;padding:0 16px;">
  <div class="log" id="log"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img src="" id="lightbox-img" />
</div>

<a href="index.html" class="back-link">← חזרה לאתר הבוחנים</a>

<script>
const OWNER = 'bohanyzahal-cyber';
const REPO = 'bohan-site';
const BRANCH = 'main';

let token = localStorage.getItem('gh_token') || '';
// Each image: { id, file, url, assignedDay: null|'weekly'|'day1'..'day5' }
let images = [];

// === TOKEN ===
const tokenInput = document.getElementById('token-input');
tokenInput.value = token;
tokenInput.addEventListener('input', () => {
  token = tokenInput.value.trim();
  localStorage.setItem('gh_token', token);
  if (token.length > 10) verifyToken();
});
if (token) verifyToken();

async function verifyToken() {
  const s = document.getElementById('token-status');
  try {
    const r = await fetch('https://api.github.com/user', { headers: { Authorization: `token ${token}` } });
    s.textContent = r.ok ? '✅' : '❌';
  } catch { s.textContent = '❌'; }
}

// === FILE INPUT ===
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(fileList) {
  for (const file of fileList) {
    if (!file.type.startsWith('image/')) continue;
    const id = 'img_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    const url = URL.createObjectURL(file);
    images.push({ id, file, url, assignedDay: null });
  }
  renderCards();
}

// === RENDER IMAGE CARDS ===
function renderCards() {
  const container = document.getElementById('image-cards');
  const step2 = document.getElementById('step2');
  const summary = document.getElementById('summary');
  const uploadBar = document.getElementById('upload-bar');

  if (images.length === 0) {
    step2.style.display = 'none';
    summary.style.display = 'none';
    uploadBar.style.display = 'none';
    return;
  }

  step2.style.display = 'block';
  summary.style.display = 'block';
  uploadBar.style.display = 'flex';

  container.innerHTML = '';

  images.forEach((img, index) => {
    const card = document.createElement('div');
    card.className = 'image-card' + (img.assignedDay ? ' assigned' : '');

    const imgEl = document.createElement('img');
    imgEl.src = img.url;
    imgEl.onclick = () => openLightbox(img.url);

    const bar = document.createElement('div');
    bar.className = 'card-bar';

    const label = document.createElement('span');
    label.className = 'card-bar-label';
    label.textContent = `תמונה ${index + 1}:`;
    bar.appendChild(label);

    const days = [
      { key: 'weekly', text: 'סידור', cls: 'weekly' },
      { key: 'day1', text: "א'" },
      { key: 'day2', text: "ב'" },
      { key: 'day3', text: "ג'" },
      { key: 'day4', text: "ד'" },
      { key: 'day5', text: "ה'" },
    ];

    days.forEach(day => {
      const btn = document.createElement('button');
      btn.className = 'day-btn' + (day.cls ? ' ' + day.cls : '') + (img.assignedDay === day.key ? ' selected' : '');
      btn.textContent = day.text;
      btn.onclick = () => {
        if (img.assignedDay === day.key) {
          img.assignedDay = null; // toggle off
        } else {
          img.assignedDay = day.key;
        }
        renderCards();
      };
      bar.appendChild(btn);
    });

    const removeBtn = document.createElement('button');
    removeBtn.className = 'card-remove';
    removeBtn.textContent = '✕ הסר';
    removeBtn.onclick = () => {
      images = images.filter(i => i.id !== img.id);
      renderCards();
    };
    bar.appendChild(removeBtn);

    card.appendChild(imgEl);
    card.appendChild(bar);
    container.appendChild(card);
  });

  updateSummary();
}

function updateSummary() {
  const counts = { weekly: 0, day1: 0, day2: 0, day3: 0, day4: 0, day5: 0, none: 0 };
  images.forEach(img => {
    if (img.assignedDay) counts[img.assignedDay]++;
    else counts.none++;
  });

  Object.entries(counts).forEach(([key, val]) => {
    const el = document.querySelector(`[data-sum="${key}"]`);
    if (el) {
      el.textContent = val > 0 ? `${val} תמונות` : '—';
      el.classList.toggle('empty', val === 0);
    }
  });

  const assigned = images.filter(i => i.assignedDay).length;
  document.getElementById('upload-status').textContent = `${assigned}/${images.length} משויכות`;
}

// === LIGHTBOX ===
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target !== document.getElementById('lightbox-img')) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// === CLEAR ALL ===
function clearAll() {
  if (!confirm('למחוק את כל התמונות מהדף?')) return;
  images = [];
  renderCards();
}

// === UPLOAD ALL ===
async function uploadAll() {
  if (!token) { alert('הכנס Token קודם'); return; }

  const assigned = images.filter(i => i.assignedDay);
  const unassigned = images.filter(i => !i.assignedDay);

  if (assigned.length === 0) { alert('שייך לפחות תמונה אחת ליום'); return; }
  if (unassigned.length > 0) {
    if (!confirm(`יש ${unassigned.length} תמונות לא משויכות. להמשיך בלעדיהן?`)) return;
  }

  const btn = document.getElementById('btn-upload');
  btn.disabled = true;
  btn.textContent = '⏳ מעלה...';
  const progress = document.getElementById('progress');
  const progressFill = document.getElementById('progress-fill');
  progress.classList.add('visible');
  const log = document.getElementById('log');
  log.innerHTML = '';

  // Group by day
  const groups = {};
  assigned.forEach(img => {
    if (!groups[img.assignedDay]) groups[img.assignedDay] = [];
    groups[img.assignedDay].push(img);
  });

  const totalImages = assigned.length;
  let done = 0;

  // Delete existing images in the lanes we're uploading to
  for (const lane of Object.keys(groups)) {
    const apiPath = lane === 'weekly' ? 'images/weekly' : `images/orders/${lane}`;
    addLog(`Cleaning ${apiPath}...`, 'info');

    try {
      const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${apiPath}?ref=${BRANCH}`, {
        headers: { Authorization: `token ${token}` }
      });
      if (resp.ok) {
        const files = await resp.json();
        if (Array.isArray(files)) {
          for (const file of files) {
            if (/\.(jpg|jpeg|png|webp)$/i.test(file.name)) {
              await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${file.path}`, {
                method: 'DELETE',
                headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Delete ${file.name}`, sha: file.sha, branch: BRANCH })
              });
              addLog(`Deleted old: ${file.name}`, 'info');
            }
          }
        }
      }
    } catch (e) {
      addLog(`Warning: ${e.message}`, 'err');
    }
  }

  // Upload new images
  for (const [lane, imgs] of Object.entries(groups)) {
    for (let i = 0; i < imgs.length; i++) {
      const img = imgs[i];
      const ext = img.file.name.split('.').pop().toLowerCase();
      let path;
      if (lane === 'weekly') {
        path = imgs.length === 1 ? `images/weekly/schedule.${ext}` : `images/weekly/${i + 1}.${ext}`;
      } else {
        path = `images/orders/${lane}/${i + 1}.${ext}`;
      }

      try {
        const base64 = await fileToBase64(img.file);
        const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
          method: 'PUT',
          headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `Upload ${path}`, content: base64, branch: BRANCH })
        });

        if (resp.ok) {
          addLog(`✅ ${path}`, 'ok');
        } else {
          const err = await resp.json();
          addLog(`❌ ${path}: ${err.message}`, 'err');
        }
      } catch (e) {
        addLog(`❌ ${path}: ${e.message}`, 'err');
      }

      done++;
      progressFill.style.width = `${(done / totalImages) * 100}%`;
    }
  }

  addLog(`🎉 סיום! ${done} תמונות הועלו בהצלחה`, 'info');
  btn.textContent = '💾 שמור באתר';
  btn.disabled = false;
  document.getElementById('upload-status').textContent = '✅ הועלה בהצלחה!';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function addLog(msg, type) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = `log-item log-${type}`;
  div.textContent = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
